name: CI — Lint, Test & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Análisis estático y estilo ──────────────────────────────────────────────
  lint:
    name: PHP Lint & Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, fileinfo, openssl, pdo, bcmath, json
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies (dev)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Laravel Pint (code style)
        run: ./vendor/bin/pint --test

  # ─── Tests unitarios e integración ──────────────────────────────────────────
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, fileinfo, openssl, pdo, pdo_mysql, bcmath, json
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Configure test DB
        run: |
          echo "DB_CONNECTION=mysql"          >> .env
          echo "DB_HOST=127.0.0.1"            >> .env
          echo "DB_PORT=3306"                 >> .env
          echo "DB_DATABASE=testing"          >> .env
          echo "DB_USERNAME=root"             >> .env
          echo "DB_PASSWORD=password"         >> .env
          echo "CACHE_DRIVER=array"           >> .env
          echo "SESSION_DRIVER=array"         >> .env
          echo "QUEUE_CONNECTION=sync"        >> .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests with coverage
        run: php artisan test --coverage --min=50

  # ─── Auditoría de seguridad de dependencias ──────────────────────────────────
  security:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Composer audit (CVE check)
        run: composer audit --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: NPM audit
        run: npm audit --audit-level=high
